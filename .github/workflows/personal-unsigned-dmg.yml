name: Personal Unsigned DMG

on:
  push:
    branches:
      - release/personal
      - "pkg/**"
    paths:
      - ".github/workflows/personal-unsigned-dmg.yml"
      - "Config/**"
      - "PingIsland/**"
      - "PingIsland.xcodeproj/**"
      - "Prototype/**"
      - "docs/images/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build (defaults to the triggering ref)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: personal-unsigned-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned DMG
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Show toolchain
        run: xcodebuild -version

      - name: Resolve package commit suffix
        id: package
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          short_sha="${SOURCE_SHA:0:7}"
          echo "suffix=-$short_sha" >> "$GITHUB_OUTPUT"

      - name: Build unsigned DMG
        env:
          PING_ISLAND_PACKAGE_SUFFIX: ${{ steps.package.outputs.suffix }}
          PING_ISLAND_DMG_STYLE: plain
          COMPILER_INDEX_STORE_ENABLE: NO
        run: bash scripts/package-unsigned.sh

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ping-island-unsigned${{ steps.package.outputs.suffix }}
          path: |
            releases/unsigned/*.dmg
          if-no-files-found: error
          retention-days: 7
